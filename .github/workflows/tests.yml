name: tests

on:
  push:
    branches: [main]
    paths:
      - 'Mama Vida/engine.js'
      - 'Mama Vida/test/**'
      - 'Mama Vida/package.json'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run engine tests
        working-directory: Mama Vida
        run: node --test test/*.test.js
